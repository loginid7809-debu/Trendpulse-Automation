name: TrendPulse — Auto Content Pipeline

on:
  repository_dispatch:
    types: [trigger-content]   # fired by Google Apps Script
  workflow_dispatch:            # manual trigger from GitHub UI
  schedule:
    - cron: '0 */3 * * *'     # safety fallback every 3 hours

env:
  YOUTUBE_CLIENT_ID:     ${{ secrets.YOUTUBE_CLIENT_ID }}
  YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
  YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
  GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
  PEXELS_API_KEY:        ${{ secrets.PEXELS_API_KEY }}
  NEWS_API_KEY:          ${{ secrets.NEWS_API_KEY }}

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 28

    steps:
      # 1. Checkout
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      # 3. System packages
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg \
            fonts-liberation fonts-noto imagemagick

      # 4. Python packages
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # 5. Download fonts
      - name: Download Poppins fonts
        run: |
          mkdir -p assets/fonts
          BASE="https://github.com/google/fonts/raw/main/ofl/poppins"
          wget -q -O assets/fonts/Bold.ttf      "$BASE/Poppins-Bold.ttf"
          wget -q -O assets/fonts/Regular.ttf   "$BASE/Poppins-Regular.ttf"
          wget -q -O assets/fonts/ExtraBold.ttf "$BASE/Poppins-ExtraBold.ttf"

      # 6. Create watermark
      - name: Create watermark image
        run: |
          python - <<'EOF'
          from PIL import Image, ImageDraw, ImageFont
          img  = Image.new('RGBA', (260, 55), (0, 0, 0, 0))
          draw = ImageDraw.Draw(img)
          try:
              font = ImageFont.truetype('assets/fonts/Bold.ttf', 22)
          except Exception:
              font = ImageFont.load_default()
          draw.text((10, 12), '⚡ TrendPulse Global',
                    font=font, fill=(255, 255, 255, 160))
          img.save('assets/watermark.png')
          print("Watermark created.")
          EOF

      # 7. Run pipeline
      - name: Run TrendPulse pipeline
        run: python main.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      # 8. Save history back to repo
      - name: Commit updated history
        run: |
          git config user.email "action@github.com"
          git config user.name  "TrendPulse Bot"
          git add data/upload_history.json
          git diff --staged --quiet || \
            git commit -m "chore: update upload history [skip ci]"
          git push || echo "Nothing new to push"
